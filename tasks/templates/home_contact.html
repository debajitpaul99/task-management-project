{% extends "base.html" %}
{% block content %}

<!-- Contact Section -->
<section class="py-10 bg-emerald-50">
    <h1 class="text-4xl font-semibold text-gray-800 text-center mb-10">
        Contact Us
    </h1>
  <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12">

    <!-- Contact Info -->
    <div>
      <h2 class="text-2xl font-bold mb-4">Get in Touch</h2>
      <p class="text-gray-600 mb-6">
        Reach out to us for support, feedback, or collaboration.
      </p>

      <ul class="space-y-4 text-gray-700">
        <li>📧 Email: <span class="font-medium">support@mymanager.app</span></li>
        <li>📍 Location: Bangladesh</li>
        <li>⏰ Support Hours: Mon – Fri (9 AM – 6 PM)</li>
      </ul>
    </div>

    <!-- Contact Form -->
    <form method="POST" class="bg-gray-50 p-6 rounded-xl shadow-sm space-y-4">
      {% csrf_token %}
      
      <div class="space-y-4">
          {{ contact_form.as_p }}
      </div>

      <button type="submit" class="w-full py-3 rounded-xl text-white
           bg-gradient-to-r from-emerald-500 to-emerald-700">
        Send Message
      </button>
    </form>

  </div>
</section>

{% endblock %}
