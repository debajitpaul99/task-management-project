<nav class="bg-white shadow-md">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16 items-center">

      <!-- Logo -->
      <a href="{% url 'home' %}" class="text-2xl font-bold text-gray-800">
        MyManager
      </a>

      <!-- Desktop Menu -->
      <div class="hidden md:flex space-x-4 items-center">
        <form method="POST" action="{% url 'sign-out' %}">
          {% csrf_token %}
          <button type="submit"
                  class="px-4 py-2 rounded-xl border border-emerald-600 text-emerald-600 hover:bg-emerald-50 transition">
            Logout
          </button>
        </form>
      </div>

      <!-- Mobile Toggle Button -->
      <div class="md:hidden">
        <button id="menuBtn" class="p-2 rounded-md hover:bg-gray-100 transition">
          <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div id="mobileMenu" class="md:hidden hidden px-4 pt-2 pb-4 bg-white border-t border-gray-200 space-y-2">
    <form method="POST" action="{% url 'sign-out' %}">
      {% csrf_token %}
      <button type="submit"
              class="w-full text-left px-4 py-2 rounded-xl border border-emerald-600 text-emerald-600 hover:bg-emerald-50 transition">
        Logout
      </button>
    </form>
  </div>
</nav>

<script>
  const menuBtn = document.getElementById("menuBtn");
  const mobileMenu = document.getElementById("mobileMenu");

  menuBtn.addEventListener("click", () => {
    mobileMenu.classList.toggle("hidden");
  });
</script>
