{% extends "base.html" %}
{% block content %}

<!-- Full page container -->
<div class="min-h-screen flex items-center justify-center bg-emerald-50 px-4 py-8">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 sm:p-8">

    <!-- Heading -->
    <h1 class="text-2xl sm:text-3xl font-extrabold text-gray-800 text-center mb-2">
      Reset Password
    </h1>

    <p class="text-gray-600 text-center mb-6 text-sm sm:text-base">
      Enter your email address and we’ll send you a reset link.
    </p>

    <!-- Password Reset Form -->
    <form method="POST" class="space-y-4">
      {% csrf_token %}

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Email address
        </label>

        <input
          type="email"
          name="email"
          placeholder="Enter your email"
          required
          class="w-full px-3 py-2.5 border border-gray-300 rounded-lg shadow-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-emerald-500"
        />
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="w-full bg-gradient-to-r from-emerald-500 to-green-600 text-white font-semibold py-2.5 rounded-lg hover:opacity-90 transition"
      >
        Send Reset Link
      </button>

    </form>

  </div>

</div>

{% endblock content %}
