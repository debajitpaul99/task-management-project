{% extends "base.html" %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-emerald-50 px-4 py-8">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 sm:p-8">

    <!-- Heading -->
    <h1 class="text-2xl sm:text-3xl font-extrabold text-gray-800 text-center mb-2">
      Welcome to MyManager
    </h1>
    <p class="text-gray-600 text-center mb-6 text-sm sm:text-base">
      Sign in to continue to your account
    </p>

    <!-- Sign In Form -->
    <form method="POST" class="space-y-4">
      {% csrf_token %}

      <!-- Username -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Username
        </label>
        <input
          type="text"
          name="username"
          placeholder="Enter username"
          class="w-full px-3 py-2.5 border border-gray-300 rounded-lg shadow-sm text-gray-700"
        >
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Password
        </label>
        <input
          type="password"
          name="password"
          placeholder="Enter password"
          class="w-full px-3 py-2.5 border border-gray-300 rounded-lg shadow-sm text-gray-700"
        >
      </div>

      <!-- Sign In Button -->
      <button
        type="submit"
        class="w-full bg-gradient-to-r from-emerald-500 to-green-600 text-white font-semibold py-2.5 rounded-lg hover:opacity-90 transition"
      >
        Sign In
      </button>

    </form>

    <!-- Extra Links -->
    <div class="mt-6 text-center text-sm text-gray-600 space-y-2">

      <p>
        Don't have an account?
        <a href="{% url "sign-up" %}" class="text-blue-600 hover:underline">
          Sign Up
        </a>
      </p>

      <p>
        <a href="{% url "password-reset" %}" class="text-blue-600 hover:underline">
          Forgot Password?
        </a>
      </p>

    </div>

  </div>

</div>

{% endblock content %}
