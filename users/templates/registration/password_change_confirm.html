{% extends "base.html" %}
{% block content %}

<!-- Full page container -->
<div class="min-h-screen flex items-center justify-center bg-emerald-50 px-4 py-10">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 sm:p-8">

    <!-- Success Icon -->
    <div class="mx-auto mb-4 flex items-center justify-center w-16 h-16 rounded-full bg-emerald-100">
      <svg xmlns="http://www.w3.org/2000/svg"
           class="h-8 w-8 text-emerald-600"
           fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M5 13l4 4L19 7" />
      </svg>
    </div>

    <!-- Heading -->
    <h1 class="text-3xl font-extrabold text-gray-800 mb-2">
      Password Updated
    </h1>

    <p class="text-gray-600 mb-6">
      Your password has been changed successfully.
    </p>

    <!-- Actions -->
    <div class="space-y-3">
      <a href="{% url 'user-profile' %}"
         class="block w-full bg-gradient-to-r from-emerald-500 to-green-600 text-white font-semibold py-2 px-4 rounded-md hover:opacity-90 transition">
        Go to Profile
      </a>
    </div>

  </div>
</div>

{% endblock content %}
