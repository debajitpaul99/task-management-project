{% extends "base.html" %}
{% block content %}

<!-- Full page container -->
<div class="min-h-screen flex items-center justify-center bg-emerald-50 px-4 py-10">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 sm:p-8">

    <!-- Heading -->
    <h1 class="text-3xl font-extrabold text-gray-800 text-center mb-4">
      Change Password
    </h1>
    <p class="text-gray-600 text-center mb-6">
      Update your account password securely
    </p>

    <!-- Password Change Form -->
    <form method="POST">
      {% csrf_token %}

      <!-- Old Password -->
      <div class="mb-4">
        <label class="text-sm font-medium text-gray-700">
          Old Password
        </label>
        <input type="password" name="old_password"
               placeholder="Enter old password"
               class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm text-gray-700 focus:ring-emerald-500 focus:border-emerald-500">
      </div>

      <!-- New Password -->
      <div class="mb-4">
        <label class="text-sm font-medium text-gray-700">
          New Password
        </label>
        <input type="password" name="new_password1"
               placeholder="Enter new password"
               class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm text-gray-700 focus:ring-emerald-500 focus:border-emerald-500">
      </div>

      <!-- Confirm New Password -->
      <div class="mb-4">
        <label class="text-sm font-medium text-gray-700">
          Confirm New Password
        </label>
        <input type="password" name="new_password2"
               placeholder="Confirm new password"
               class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm text-gray-700 focus:ring-emerald-500 focus:border-emerald-500">
      </div>

      <!-- Submit Button -->
      <button type="submit"
              class="mt-5 w-full bg-gradient-to-r from-emerald-500 to-green-600 text-white font-semibold py-2 px-4 rounded-md hover:opacity-90 transition">
        Update Password
      </button>
    </form>

    <!-- Extra Links -->
    <div class="mt-6 text-center text-sm text-gray-600">
      <a href="{% url 'user-profile' %}" class="text-blue-600 hover:underline">
        Back to Profile
      </a>
    </div>

  </div>
</div>

{% endblock content %}
