{% extends "base.html" %}
{% block content %}

<div class="min-h-screen bg-emerald-50 flex items-center justify-center px-4 py-10">

    <div class="w-full max-w-md bg-white shadow-lg rounded-2xl p-6 sm:p-8">

        <form method="POST" enctype="multipart/form-data" class="space-y-4">
            {% csrf_token %}

            <!-- Profile Image -->
            <div>
                
                {% if user.profile_image %}
                    <img src="{{ user.profile_image.url }}"
                         class="w-24 h-24 rounded-full object-cover mx-auto mb-3">
                {% endif %}

                <input type="file"
                       name="profile_image"
                       class="block w-full text-sm text-gray-600 mb-2">

                <!-- Clear Checkbox -->
                <label class="inline-flex text-sm text-gray-600">
                    <input type="checkbox" name="profile_image-clear" class="mr-2">
                    Clear Image
                </label>
            </div>

            <!-- Other Fields -->
            {% for field in form %}
                {% if field.name != "profile_image" %}
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        {{ field.label }}
                    </label>

                    {{ field }}

                    {% if field.errors %}
                    <p class="text-sm text-red-600 mt-1">
                        {{ field.errors|striptags }}
                    </p>
                    {% endif %}
                </div>
                {% endif %}
            {% endfor %}

            <!-- Submit -->
            <button type="submit"
                class="w-full py-2.5 sm:py-3 rounded-lg text-white font-semibold
                       bg-gradient-to-r from-emerald-500 to-green-600
                       hover:from-green-600 hover:to-emerald-500
                       transition shadow-md">
                Submit
            </button>

        </form>

    </div>

</div>

{% endblock content %}
