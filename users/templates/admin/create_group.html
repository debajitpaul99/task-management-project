{% extends "base.html" %}
{% block content %}


<div class="flex justify-center items-center px-4 py-10 bg-emerald-50 min-h-screen">

    <form method="POST" 
          class="w-full sm:w-3/4 lg:w-1/2 
                 bg-white shadow-lg rounded-2xl 
                 px-6 sm:px-8 py-8">

        {% csrf_token %}
        
        <h2 class="text-xl sm:text-2xl font-semibold text-gray-700 mb-6 text-center">
            Create Group
        </h2>
        
        <div class="space-y-4">
            {{ group_form }}
        </div>
        
        <button type="submit" 
                class="mt-6 w-full bg-blue-600 hover:bg-blue-700 
                       text-white font-semibold py-2.5 px-4 rounded-lg 
                       transition duration-200 
                       focus:outline-none focus:ring-2 focus:ring-blue-400">
            Create Group
        </button>

    </form>

</div>

{% endblock content %}
